services:
  mysql:
    image: mysql:8.4
    container_name: campusmart-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-campusmart}
      MYSQL_USER: ${MYSQL_USER:-campusmart}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-campusmart}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - campusmart-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  campusmart-mysql-data:


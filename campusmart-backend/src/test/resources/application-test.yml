spring:
  datasource:
    url: jdbc:h2:mem:campusmart_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop

app:
  jwt:
    secret: campusmart-test-secret-key-must-be-at-least-256-bits-long
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:5173
  storage:
    upload-dir: ${java.io.tmpdir}/campusmart-test-uploads
